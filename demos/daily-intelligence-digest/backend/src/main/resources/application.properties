spring.application.name=backend

# Manual phase-1 execution:
# ./mvnw spring-boot:run -Dspring-boot.run.arguments=--digest.daily.run-on-startup=true
digest.daily.run-on-startup=false
digest.daily.output-dir=output
digest.daily.connect-timeout=10s
digest.daily.read-timeout=20s
digest.daily.rss-sources[0].name=Hacker News Front Page
digest.daily.rss-sources[0].url=https://hnrss.org/frontpage
digest.daily.rss-sources[0].max-items=20
digest.daily.rss-sources[1].name=arXiv cs.AI
digest.daily.rss-sources[1].url=https://rss.arxiv.org/rss/cs.AI
digest.daily.rss-sources[1].max-items=20
digest.daily.rss-sources[2].name=arXiv cs.LG
digest.daily.rss-sources[2].url=https://rss.arxiv.org/rss/cs.LG
digest.daily.rss-sources[2].max-items=20
digest.daily.rss-sources[3].name=arXiv cs.CL
digest.daily.rss-sources[3].url=https://rss.arxiv.org/rss/cs.CL
digest.daily.rss-sources[3].max-items=20
